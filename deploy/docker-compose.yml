version: "3.8"

services:
  mokuro-bunko:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: mokuro-bunko
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - mokuro-data:/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - MOKURO_HOST=0.0.0.0
      - MOKURO_PORT=8080
      - MOKURO_STORAGE=/data
      - MOKURO_REGISTRATION_MODE=self
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  mokuro-data:
    driver: local
